<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GIYONO AI - WAR ROOM v5 (GITHUB SYNC)</title>

<style>
body { background:#000; color:#eee; font-family:sans-serif; margin:0; }
.wrapper { display:flex; flex-direction:column; height:100vh; }

.header { padding:15px; background:#111; border-bottom:2px solid #0f0; text-align:center; }
input {
    background:#000;
    border:1px solid #0f0;
    color:#0f0;
    font-size:22px;
    text-align:center;
    padding:10px;
}

#price {
    font-size:48px;
    color:#ff0;
    margin-top:10px;
}

.main {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:5px;
    padding:5px;
    flex-grow:1;
}

.chart { height:350px; border:1px solid #333; }

#ai {
    grid-column:span 2;
    background:#050505;
    color:#0f0;
    padding:10px;
    font-family:monospace;
    font-size:13px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
    <input id="sym" value="ASRI" onkeyup="if(event.keyCode==13) run()">
    <div id="price">LOADING...</div>
</div>

<div class="main">
    <div id="c1" class="chart"></div>
    <div id="c2" class="chart"></div>
    <div id="ai">MENUNGGU DATA...</div>
</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

// 🔥 PASTE URL GAS ANDA DI SINI
const GAS = "https://script.google.com/macros/s/AKfycbzxM1DTLC9y0L_gsGuQyJfxu9ClVeXbDCQvPaFInrDaLJJz4W_H2cT1BKp_Ni4uf8h7/exec";

function chart(id, s){
    document.getElementById(id).innerHTML="";
    new TradingView.widget({
        autosize:true,
        symbol:(s=="IHSG")?"IDX:COMPOSITE":"IDX:"+s,
        interval:"D",
        theme:"dark",
        style:"1",
        container_id:id
    });
}

async function run(){

    const s = document.getElementById("sym").value.toUpperCase();

    // load chart
    chart("c1", s);
    chart("c2", "IHSG");

    document.getElementById("price").innerText="LOADING...";
    document.getElementById("ai").innerText="AMBIL DATA...";

    try{

        // 🔥 AMBIL HARGA REAL (YAHOO)
        const r = await fetch(
            "https://api.allorigins.win/get?url=" +
            encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+s+".JK?interval=1m&range=1d")
        );

        const j = await r.json();
        const meta = JSON.parse(j.contents).chart.result[0].meta;
        const price = meta.regularMarketPrice;

        document.getElementById("price").innerText = price;

        // 🔥 KIRIM KE GAS (INI KUNCI)
        const ai = await fetch(`${GAS}?exec=true&symbol=${s}&price=${price}`);
        const data = await ai.json();

        if(data.choices){
            document.getElementById("ai").innerHTML =
                data.choices[0].message.content.replace(/\n/g,"<br>");
        }else{
            document.getElementById("ai").innerText="AI RESPONSE TIDAK VALID";
        }

    }catch(e){
        document.getElementById("price").innerText="OFFLINE";
        document.getElementById("ai").innerText="ERROR: "+e.message;
    }
}

window.onload = run;

</script>

</body>
</html>
